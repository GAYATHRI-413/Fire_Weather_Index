<!DOCTYPE html>
<html>
<head>
    <title>Fire Weather Index</title>

    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            width:600px;
        }

        .form-grid{
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:12px;
        }

        .field{
            display:flex;
            flex-direction:column;
        }

        label{
            font-size:13px;
            margin-bottom:5px;
            color:#333;
        }

        input{
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        .predict{
            margin-top:15px;
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
            border-radius:6px;
        }

        #geo{
            text-align:center;
            font-weight:bold;
            margin:10px 0;
        }

        #weather{
            text-align:center;
            font-size:14px;
            margin-bottom:10px;
        }

        #result{
            text-align:center;
            font-size:18px;
            margin-top:10px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="card">

<h2 style="text-align:center;">🔥 Fire Weather Index</h2>

<div class="form-grid">

    <div class="field">
        <label>Day</label>
        <input id="day" type="number">
    </div>

    <div class="field">
        <label>Month</label>
        <input id="month" type="number">
    </div>

    <div class="field">
        <label>Year</label>
        <input id="year" type="number">
    </div>

    <div class="field">
        <label>Temperature</label>
        <input id="Temperature" type="number">
    </div>

    <div class="field">
        <label>Humidity (RH)</label>
        <input id="RH" type="number">
    </div>

    <div class="field">
        <label>Wind Speed</label>
        <input id="Ws" type="number">
    </div>

    <div class="field">
        <label>Rainfall</label>
        <input id="Rain" type="number">
    </div>

    <div class="field">
        <label>FFMC</label>
        <input id="FFMC" type="number">
    </div>

    <div class="field">
        <label>DMC</label>
        <input id="DMC" type="number">
    </div>

    <div class="field">
        <label>DC</label>
        <input id="DC" type="number">
    </div>

    <div class="field">
        <label>ISI</label>
        <input id="ISI" type="number">
    </div>

    <div class="field">
        <label>BUI</label>
        <input id="BUI" type="number">
    </div>

</div>

<h3 id="geo">📍 Detecting location...</h3>
<div id="weather"></div>

<button class="predict" onclick="predict()">Predict</button>

<h3 id="result"></h3>

</div>

<script>

async function predict(){
    let data = {
        day:+day.value,
        month:+month.value,
        year:+year.value,
        Temperature:+Temperature.value,
        RH:+RH.value,
        Ws:+Ws.value,
        Rain:+Rain.value,
        FFMC:+FFMC.value,
        DMC:+DMC.value,
        DC:+DC.value,
        ISI:+ISI.value,
        BUI:+BUI.value
    };

    let res = await fetch("/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    });

    let out = await res.json();
    document.getElementById("result").innerText =
        "🔥 FWI: " + out.fwi.toFixed(2);
}

/* GEOLOCATION */
function getLocation(){
    if(!navigator.geolocation){
        document.getElementById("geo").innerText = "Geolocation not supported";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        async function(pos){

            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            document.getElementById("geo").innerText =
                "📍 Location: " + lat.toFixed(2) + ", " + lon.toFixed(2);

            let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation`;

            let res = await fetch(url);
            let data = await res.json();

            document.getElementById("weather").innerHTML =
                "🌡 " + data.current.temperature_2m + "°C  |  " +
                "💧 " + data.current.relative_humidity_2m + "%  |  " +
                "🌧 " + data.current.precipitation + "mm";

        },
        function(){
            document.getElementById("geo").innerText =
                "Location permission denied";
        },
        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}

window.onload = getLocation;

</script>

</body>
</html>
