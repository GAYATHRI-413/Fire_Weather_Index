<!DOCTYPE html>
<html>
<head>
    <title>Fire Weather Index</title>

    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            width:550px;
        }

        .grid{
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:10px;
        }

        input{
            padding:8px;
            width:90%;
        }

        .box{
            display:flex;
            align-items:center;
            gap:5px;
        }

        button{
            padding:5px 10px;
            cursor:pointer;
        }

        .predict{
            margin-top:10px;
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
        }

        /* GEO LOCATION STYLE */
        #geo{
            text-align:center;
            font-size:22px;
            font-weight:bold;
            margin:10px 0;
        }
    </style>
</head>

<body>

<div class="card">

<h2 style="text-align:center;">🔥 Fire Weather Index</h2>

<div class="grid">

<input id="day" placeholder="day" onkeydown="next(event,'month')">
<input id="month" placeholder="month" onkeydown="next(event,'year')">
<input id="year" placeholder="year" onkeydown="next(event,'Temperature')">

<div class="box">
<button onclick="dec('Temperature')">-</button>
<input id="Temperature" type="number" value="0" onkeydown="next(event,'RH')">
<button onclick="inc('Temperature')">+</button>
</div>

<div class="box">
<button onclick="dec('RH')">-</button>
<input id="RH" type="number" value="0" onkeydown="next(event,'Ws')">
<button onclick="inc('RH')">+</button>
</div>

<div class="box">
<button onclick="dec('Ws')">-</button>
<input id="Ws" type="number" value="0" onkeydown="next(event,'Rain')">
<button onclick="inc('Ws')">+</button>
</div>

<div class="box">
<button onclick="dec('Rain')">-</button>
<input id="Rain" type="number" value="0" onkeydown="next(event,'FFMC')">
<button onclick="inc('Rain')">+</button>
</div>

<input id="FFMC" placeholder="FFMC" onkeydown="next(event,'DMC')">
<input id="DMC" placeholder="DMC" onkeydown="next(event,'DC')">
<input id="DC" placeholder="DC" onkeydown="next(event,'ISI')">
<input id="ISI" placeholder="ISI" onkeydown="next(event,'BUI')">
<input id="BUI">

</div>

<!-- GEO LOCATION -->
<h3 id="geo">📍 Detecting location...</h3>

<button class="predict" onclick="predict()">Predict</button>

<h3 id="result" style="text-align:center;"></h3>

</div>

<script>

function next(e,nextId){
    if(e.key === "Enter"){
        e.preventDefault();
        if(nextId){
            document.getElementById(nextId).focus();
        }
    }
}

function inc(id){
    document.getElementById(id).value =
        Number(document.getElementById(id).value) + 1;
}

function dec(id){
    document.getElementById(id).value =
        Number(document.getElementById(id).value) - 1;
}

async function predict(){
    let data = {
        day:+day.value,
        month:+month.value,
        year:+year.value,
        Temperature:+Temperature.value,
        RH:+RH.value,
        Ws:+Ws.value,
        Rain:+Rain.value,
        FFMC:+FFMC.value,
        DMC:+DMC.value,
        DC:+DC.value,
        ISI:+ISI.value,
        BUI:+BUI.value
    };

    let res = await fetch("/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    });

    let out = await res.json();
    document.getElementById("result").innerText =
        "🔥 FWI: " + out.fwi;
}

/* GEOLOCATION (SAFE VERSION) */
function getLocation(){
    try{
        if(!navigator.geolocation){
            document.getElementById("geo").innerText =
                "📍 Geolocation not supported";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos){
                document.getElementById("geo").innerText =
                    "📍 Lat: " + pos.coords.latitude.toFixed(4) +
                    " | Lon: " + pos.coords.longitude.toFixed(4);
            },
            function(){
                document.getElementById("geo").innerText =
                    "📍 Location blocked (still works normally)";
            },
            { timeout: 5000 }
        );

    } catch(e){
        document.getElementById("geo").innerText =
            "📍 Location unavailable";
    }
}

window.onload = getLocation;

</script>

</body>
</html>
